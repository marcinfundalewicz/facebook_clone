<!doctype html>
<html lang=pl>
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Facebook Clone</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>Facebook Clone</h1>
</header>

<main>

    <section aria-labelledby="create-post-title">
        <h2 id="create-post-title">Create post</h2>
        <form id="create-post-form">
            <label for="post-content">Post content</label>
            <textarea id="post-content" placeholder="What's on your mind?" required maxlength="280"></textarea>
            <p id="form-error" aria-live="polite"></p>
            <button type="submit">Post</button>
        </form>
    </section>

    <section id="feed" aria-labelledby="feed-title">
        <h2 id="feed-title">Feed</h2>
    </section>

</main>

<script src="js/app.js"></script>
</body>
</html>
