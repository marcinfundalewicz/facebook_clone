databaseChangeLog:
  - changeSet:
      id: 002-create-posts
      author: marcin
      changes:
        - createTable:
            tableName: posts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: content
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: author_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            constraintName: fk_posts_author
            baseTableName: posts
            baseColumnNames: author_id
            referencedTableName: users
            referencedColumnNames: id

  - changeSet:
      id: 003-create-comments
      author: marcin
      changes:
        - createTable:
            tableName: comments
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: content
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: post_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: author_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            constraintName: fk_comments_post
            baseTableName: comments
            baseColumnNames: post_id
            referencedTableName: posts
            referencedColumnNames: id

        - addForeignKeyConstraint:
            constraintName: fk_comments_author
            baseTableName: comments
            baseColumnNames: author_id
            referencedTableName: users
            referencedColumnNames: id

  - changeSet:
      id: 004-create-reactions
      author: marcin
      changes:
        - createTable:
            tableName: reactions
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: post_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            constraintName: fk_reactions_post
            baseTableName: reactions
            baseColumnNames: post_id
            referencedTableName: posts
            referencedColumnNames: id

        - addForeignKeyConstraint:
            constraintName: fk_reactions_user
            baseTableName: reactions
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id

        - addUniqueConstraint:
            constraintName: uq_reaction_post_user
            tableName: reactions
            columnNames: post_id,user_id
