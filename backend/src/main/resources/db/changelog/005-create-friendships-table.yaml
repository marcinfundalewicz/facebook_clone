databaseChangeLog:
  - changeSet:
      id: create-friendships-table
      author: marcin
      changes:

        - createTable:
            tableName: friendships
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: requester_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: addressee_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: friendships
            baseColumnNames: requester_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_friendship_requester

        - addForeignKeyConstraint:
            baseTableName: friendships
            baseColumnNames: addressee_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_friendship_addressee